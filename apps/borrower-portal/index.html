<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><title>Borrower Portal</title><style>body{font-family:system-ui,sans-serif;background:#0b1020;color:#eef2ff;margin:0}.wrap{max-width:960px;margin:0 auto;padding:20px}.card{background:#121933;border:1px solid #24314f;border-radius:16px;padding:16px;margin-bottom:16px}input,button{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:1px solid #34476b;background:#0f172a;color:#eef2ff;box-sizing:border-box}button{cursor:pointer;background:#1d4ed8}pre{white-space:pre-wrap;background:#0a1223;padding:12px;border-radius:12px}a{color:#93c5fd}</style></head><body><div class="wrap"><p><a href="../ops-console/">← Ops Console</a></p><div class="card"><h2>ログイン</h2><label>API URL<input id="apiUrl" value="http://localhost:3000"></label><label>Username<input id="username" value="borrower"></label><label>Password<input id="password" type="password" value="borrower"></label><button id="loginBtn">ログイン</button><pre id="loginOut"></pre></div><div class="card"><h2>Quote</h2><label>Borrower ID<input id="borrowerId"></label><label>Principal<input id="principal" value="1000"></label><label>Term days<input id="termDays" value="90"></label><button id="quoteBtn">見積もり生成</button><pre id="quoteOut"></pre></div><div class="card"><h2>My Loans</h2><button id="loansBtn">取得</button><pre id="loansOut"></pre></div></div><script>let token=null; const $=id=>document.getElementById(id); async function api(path,options={}){const h={'content-type':'application/json',...(options.headers||{})}; if(token) h.authorization=`Bearer ${token}`; const r=await fetch($('apiUrl').value.trim()+path,{...options,headers:h}); const t=await r.text(); let b; try{b=JSON.parse(t)}catch{b=t} return {status:r.status,body:b}} $('loginBtn').onclick=async()=>{const r=await api('/v1/auth/login',{method:'POST',body:JSON.stringify({username:$('username').value,password:$('password').value})}); token=r.body.accessToken||null; $('loginOut').textContent=JSON.stringify(r,null,2)}; $('quoteBtn').onclick=async()=>{$('quoteOut').textContent=JSON.stringify(await api('/v1/loans/quote',{method:'POST',body:JSON.stringify({borrowerId:$('borrowerId').value,principal:Number($('principal').value),termDays:Number($('termDays').value),riskBand:'B'})}),null,2)}; $('loansBtn').onclick=async()=>{$('loansOut').textContent=JSON.stringify(await api('/v1/loans'),null,2)};</script></body></html>
